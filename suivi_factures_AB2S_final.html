<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi Factures — AB2S</title>
<link rel="icon" type="image/png" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0f1f3d;
    --blue: #2563eb;
    --blue-light: #dbeafe;
    --surface: #f8fafc;
    --white: #ffffff;
    --border: #e2e8f0;
    --border-dark: #cbd5e1;
    --text: #0f172a;
    --text-mid: #475569;
    --text-light: #94a3b8;
    --red-bg: #fef2f2; --red-text: #991b1b; --red-border: #fca5a5;
    --orange-bg: #fff7ed; --orange-text: #9a3412; --orange-border: #fdba74;
    --green-bg: #f0fdf4; --green-text: #166534; --green-border: #86efac;
    --gray-bg: #f8fafc; --gray-text: #475569; --gray-border: #cbd5e1;
    --purple-bg: #f5f3ff; --purple-text: #5b21b6; --purple-border: #c4b5fd;
    --radius: 8px; --radius-lg: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--text); font-size: 14px; min-height: 100vh; }
  .layout { display: flex; min-height: 100vh; }
  .sidebar { width: 220px; background: var(--navy); color: white; display: flex; flex-direction: column; flex-shrink: 0; position: sticky; top: 0; height: 100vh; }
  .sidebar-logo { padding: 1.5rem 1.25rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .sidebar-logo .company { font-size: 13px; font-weight: 600; letter-spacing: 0.05em; color: #93c5fd; text-transform: uppercase; }
  .sidebar-logo .app-name { font-size: 16px; font-weight: 500; margin-top: 2px; }
  .sidebar-nav { padding: 1rem 0.75rem; flex: 1; }
  .nav-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; color: rgba(255,255,255,0.35); text-transform: uppercase; padding: 0 0.5rem; margin-bottom: 6px; margin-top: 12px; }
  .nav-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: var(--radius); font-size: 13px; color: rgba(255,255,255,0.65); cursor: pointer; transition: all 0.15s; margin-bottom: 2px; }
  .nav-item:hover { background: rgba(255,255,255,0.07); color: white; }
  .nav-item.active { background: rgba(37,99,235,0.35); color: white; font-weight: 500; }
  .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.8; }
  .sidebar-footer { padding: 1rem; border-top: 1px solid rgba(255,255,255,0.08); font-size: 11px; color: rgba(255,255,255,0.3); }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 0.875rem 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .topbar-title { font-size: 15px; font-weight: 500; }
  .gs-connect { display: flex; align-items: center; gap: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 5px 10px; font-size: 12px; }
  .gs-connect input { border: none; background: transparent; outline: none; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-mid); width: 240px; }
  .gs-connect input::placeholder { color: var(--text-light); }
  .gs-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border-dark); flex-shrink: 0; }
  .gs-dot.connected { background: #22c55e; }
  .kpi-strip { background: var(--white); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; }
  .kpi-item { padding: 0 1rem; border-right: 1px solid var(--border); }
  .kpi-item:first-child { padding-left: 0; }
  .kpi-item:last-child { border-right: none; }
  .kpi-label { font-size: 11px; color: var(--text-light); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
  .kpi-val { font-size: 22px; font-weight: 600; font-family: 'DM Mono', monospace; }
  .kpi-val.danger { color: #dc2626; }
  .kpi-val.warning { color: #ea580c; }
  .kpi-val.success { color: #16a34a; }
  .kpi-val.info { color: var(--blue); }
  .content { padding: 1.25rem 1.5rem; flex: 1; overflow-y: auto; }
  .toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .toolbar select, .toolbar input[type="text"] { height: 34px; border: 1px solid var(--border); border-radius: var(--radius); padding: 0 10px; font-size: 13px; font-family: 'DM Sans', sans-serif; background: var(--white); color: var(--text); outline: none; transition: border-color 0.15s; }
  .toolbar select:focus, .toolbar input[type="text"]:focus { border-color: var(--blue); }
  .toolbar input[type="text"] { min-width: 180px; }
  .spacer { flex: 1; }
  .btn-primary { height: 34px; padding: 0 14px; border-radius: var(--radius); background: var(--blue); color: white; border: none; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s; }
  .btn-primary:hover { background: #1d4ed8; }
  .table-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  thead th { background: var(--surface); padding: 9px 12px; font-size: 11px; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f8fafc; }
  tbody td { padding: 9px 12px; vertical-align: middle; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; }
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500; white-space: nowrap; border: 1px solid transparent; }
  .b-traiter { background: var(--red-bg); color: var(--red-text); border-color: var(--red-border); }
  .b-cours { background: var(--orange-bg); color: var(--orange-text); border-color: var(--orange-border); }
  .b-recup { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); }
  .b-annul { background: var(--gray-bg); color: var(--gray-text); border-color: var(--gray-border); }
  .b-action { background: var(--blue-light); color: #1e40af; }
  .b-type { background: var(--purple-bg); color: var(--purple-text); border-color: var(--purple-border); }
  .b-mensuel { background: #fdf4ff; color: #7e22ce; border-color: #e9d5ff; }
  .btn-icon { background: none; border: none; cursor: pointer; color: var(--text-light); padding: 4px; border-radius: 5px; display: inline-flex; align-items: center; transition: all 0.1s; }
  .btn-icon:hover { color: #dc2626; background: var(--red-bg); }
  .btn-icon-edit:hover { color: var(--blue); background: var(--blue-light); }
  .empty-state { text-align: center; padding: 3rem; color: var(--text-light); }
  .empty-state p { font-size: 13px; margin-top: 8px; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15,31,61,0.45); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--white); border-radius: var(--radius-lg); width: 100%; max-width: 540px; border: 1px solid var(--border); animation: slideUp 0.18s ease; }
  @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header { padding: 1.125rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-header h3 { font-size: 15px; font-weight: 500; }
  .modal-body { padding: 1.25rem; display: flex; flex-direction: column; gap: 12px; }
  .modal-footer { padding: 1rem 1.25rem; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-row.full { grid-template-columns: 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 11px; font-weight: 600; color: var(--text-mid); text-transform: uppercase; letter-spacing: 0.04em; }
  .form-group input, .form-group select, .form-group textarea { height: 36px; border: 1px solid var(--border); border-radius: var(--radius); padding: 0 10px; font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--text); outline: none; transition: border-color 0.15s; background: var(--white); }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--blue); }
  .form-group textarea { height: 64px; resize: vertical; padding: 8px 10px; }
  .btn-cancel { height: 34px; padding: 0 14px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--white); font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; color: var(--text-mid); }
  .btn-cancel:hover { background: var(--surface); }
  .btn-close { background: none; border: none; cursor: pointer; color: var(--text-light); padding: 4px; border-radius: 5px; display: flex; align-items: center; }
  .btn-close:hover { color: var(--text); background: var(--surface); }
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--navy); color: white; padding: 10px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 500; opacity: 0; transform: translateY(8px); transition: all 0.2s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .view { display: none; }
  .view.active { display: block; }
  .synth-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .synth-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; }
  .synth-card h4 { font-size: 12px; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
  .synth-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .synth-row:last-child { border-bottom: none; }
  .synth-row .label { color: var(--text-mid); }
  .synth-row .vals { display: flex; gap: 12px; font-family: 'DM Mono', monospace; font-size: 12px; }
  .synth-row .count { color: var(--text-mid); }
  .synth-row .amount { color: var(--text); font-weight: 500; }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="company">AB2S</div>
      <div class="app-name">Suivi Factures</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-label">Navigation</div>
      <div class="nav-item active" onclick="showView('saisie',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>
        Toutes les factures
      </div>
      <div class="nav-item" onclick="showView('synthese',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="m7 16 4-4 4 4 4-4"/></svg>
        Synthèse
      </div>
      <div class="nav-label">Filtres rapides</div>
      <div class="nav-item" onclick="quickFilter('statut','À traiter')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        À traiter
      </div>
      <div class="nav-item" onclick="quickFilter('action','Plateforme en ligne')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        Plateformes
      </div>
      <div class="nav-item" onclick="quickFilter('action','Appeler fournisseur')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.6 1.24h3a2 2 0 0 1 2 1.72c.12.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L7.91 9a16 16 0 0 0 6.09 6.09l1.92-1.92a2 2 0 0 1 2.11-.45c.91.34 1.85.58 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        À appeler
      </div>
      <div class="nav-item" onclick="quickFilter('type','Dépenses mensuelles')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        Dépenses mensuelles
      </div>
    </nav>
    <div class="sidebar-footer">v1.0 — AB2S 2026</div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="view-title">Toutes les factures</div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="gs-connect">
          <div class="gs-dot connected" id="gs-dot"></div>
          <span style="font-size:11px;color:var(--text-light);white-space:nowrap">Sheets :</span>
          <input type="text" id="gs-url" value="https://script.google.com/macros/s/AKfycbyzaiCatGMHcA5-58IsX8ifZfVfIkZuwC1LjqFUV61AyQdijrn2xnd4K2kYwWl_hsiP/exec" />
          <button onclick="saveGsUrl()" style="border:none;background:none;cursor:pointer;font-size:11px;color:var(--blue);font-family:'DM Sans',sans-serif;white-space:nowrap;padding:0 4px">Connecter</button>
          <button onclick="loadFromSheets()" style="border:none;background:none;cursor:pointer;font-size:13px;color:var(--text-mid);padding:0 4px" title="Rafraîchir depuis Sheets">&#8635;</button>
        </div>
      </div>
    </div>

    <div class="kpi-strip" id="kpis"></div>

    <div class="content view active" id="view-saisie">
      <div class="toolbar">
        <select id="f-type" onchange="renderTable()">
          <option value="">Tous les types</option>
          <option>Matériels/Fournitures</option>
          <option>Hôtel/Déplacement</option>
          <option>Restauration</option>
          <option>Dépenses mensuelles</option>
          <option>Autres</option>
        </select>
        <select id="f-action" onchange="renderTable()">
          <option value="">Toutes les actions</option>
          <option>Plateforme en ligne</option>
          <option>Appeler fournisseur</option>
          <option>Envoyer mail</option>
          <option>Relance comptable</option>
          <option>En attente</option>
        </select>
        <select id="f-statut" onchange="renderTable()">
          <option value="">Tous les statuts</option>
          <option>À traiter</option>
          <option>En cours</option>
          <option>Récupérée</option>
          <option>Annulée</option>
        </select>
        <select id="f-mois" onchange="renderTable()">
          <option value="">Tous les mois</option>
        </select>
        <input type="text" id="f-search" placeholder="Rechercher fournisseur..." oninput="renderTable()" />
        <div class="spacer"></div>
        <button class="btn-primary" onclick="openModal()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
          Ajouter une facture
        </button>
      </div>
      <div class="table-card">
        <table>
          <colgroup>
            <col style="width:140px"><col style="width:140px"><col style="width:95px">
            <col style="width:115px"><col style="width:145px"><col style="width:105px">
            <col style="width:90px"><col style="width:auto"><col style="width:72px">
          </colgroup>
          <thead>
            <tr>
              <th>Type</th><th>Fournisseur</th><th>Montant est.</th>
              <th>Période</th><th>Action</th><th>Statut</th>
              <th>Date rég.</th><th>Commentaire</th><th></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
        <div class="empty-state" id="empty-state" style="display:none">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--border-dark)" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <p>Aucune facture trouvée.</p>
        </div>
      </div>
    </div>

    <div class="content view" id="view-synthese">
      <div class="synth-grid" id="synth-grid"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Nouvelle facture manquante</h3>
      <button class="btn-close" onclick="closeModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>Type *</label>
          <select id="in-type">
            <option value="">-- Choisir --</option>
            <option>Matériels/Fournitures</option><option>Hôtel/Déplacement</option>
            <option>Restauration</option><option>Dépenses mensuelles</option><option>Autres</option>
          </select>
        </div>
        <div class="form-group"><label>Fournisseur *</label>
          <input type="text" id="in-fourn" placeholder="Nom du fournisseur" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Montant estimé (€)</label>
          <input type="number" id="in-montant" placeholder="0.00" step="0.01" min="0" />
        </div>
        <div class="form-group"><label>Période</label>
          <select id="in-periode"></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Action à faire *</label>
          <select id="in-action">
            <option value="">-- Choisir --</option>
            <option>Plateforme en ligne</option><option>Appeler fournisseur</option>
            <option>Envoyer mail</option><option>Relance comptable</option><option>En attente</option>
          </select>
        </div>
        <div class="form-group"><label>Statut</label>
          <select id="in-statut">
            <option>À traiter</option><option>En cours</option>
            <option>Récupérée</option><option>Annulée</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Détail / Lien plateforme</label>
          <input type="text" id="in-detail" placeholder="URL ou remarque..." />
        </div>
        <div class="form-group"><label>Date régularisation</label>
          <input type="date" id="in-date" />
        </div>
      </div>
      <div class="form-row full">
        <div class="form-group"><label>Commentaire</label>
          <textarea id="in-comment" placeholder="Notes, contexte, référence commande..."></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-primary" onclick="saveEntry()">Enregistrer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MOIS = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const ANNEES = [2024,2025,2026,2027];
const GS_URL = "https://script.google.com/macros/s/AKfycbyzaiCatGMHcA5-58IsX8ifZfVfIkZuwC1LjqFUV61AyQdijrn2xnd4K2kYwWl_hsiP/exec";

let data = JSON.parse(localStorage.getItem("ab2s_factures")||"[]");
let gsUrl = localStorage.getItem("ab2s_gs_url") || GS_URL;
let editId = null;

function buildMois(){
  const opts = ['<option value="">-- Mois --</option>'];
  const fopts = ['<option value="">Tous les mois</option>'];
  ANNEES.forEach(a=>MOIS.forEach(m=>{
    opts.push(`<option>${m} ${a}</option>`);
    fopts.push(`<option>${m} ${a}</option>`);
  }));
  document.getElementById("in-periode").innerHTML = opts.join("");
  document.getElementById("f-mois").innerHTML = fopts.join("");
}

function showView(id, el){
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  document.getElementById("view-"+id).classList.add("active");
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
  if(el) el.classList.add("active");
  const titles = {saisie:"Toutes les factures", synthese:"Synthèse"};
  document.getElementById("view-title").textContent = titles[id]||"";
  if(id==="synthese") renderSynthese();
}

function quickFilter(field, val){
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
  showView("saisie", null);
  document.getElementById("f-type").value   = field==="type"   ? val : "";
  document.getElementById("f-action").value = field==="action" ? val : "";
  document.getElementById("f-statut").value = field==="statut" ? val : "";
  document.getElementById("f-mois").value   = "";
  document.getElementById("f-search").value = "";
  renderTable();
}

function saveGsUrl(){
  gsUrl = document.getElementById("gs-url").value.trim();
  localStorage.setItem("ab2s_gs_url", gsUrl);
  document.getElementById("gs-dot").className = "gs-dot" + (gsUrl?" connected":"");
  toast(gsUrl ? "URL mise à jour." : "URL supprimée.");
}

function openModal(id=null){
  editId = id;
  document.getElementById("modal-title").textContent = id ? "Modifier la facture" : "Nouvelle facture manquante";
  const e = id ? data.find(d=>d.id===id) : null;
  document.getElementById("in-type").value    = e?.type||"";
  document.getElementById("in-fourn").value   = e?.fournisseur||"";
  document.getElementById("in-montant").value = e?.montant||"";
  document.getElementById("in-periode").value = e?.periode||"";
  document.getElementById("in-action").value  = e?.action||"";
  document.getElementById("in-statut").value  = e?.statut||"À traiter";
  document.getElementById("in-detail").value  = e?.detail||"";
  document.getElementById("in-date").value    = e?.date||"";
  document.getElementById("in-comment").value = e?.comment||"";
  document.getElementById("modal-overlay").classList.add("open");
  setTimeout(()=>document.getElementById("in-fourn").focus(),50);
}
function closeModal(){ document.getElementById("modal-overlay").classList.remove("open"); }
function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }

function saveEntry(){
  const type   = document.getElementById("in-type").value;
  const fourn  = document.getElementById("in-fourn").value.trim();
  const action = document.getElementById("in-action").value;
  if(!type||!fourn||!action){ toast("Merci de remplir Type, Fournisseur et Action.","warn"); return; }
  const entry = {
    id: editId||genId(), type, fournisseur:fourn,
    montant: parseFloat(document.getElementById("in-montant").value)||0,
    periode: document.getElementById("in-periode").value,
    action, statut: document.getElementById("in-statut").value,
    detail: document.getElementById("in-detail").value.trim(),
    date: document.getElementById("in-date").value,
    comment: document.getElementById("in-comment").value.trim(),
    createdAt: editId?(data.find(d=>d.id===editId)?.createdAt||Date.now()):Date.now()
  };
  data = editId ? data.map(d=>d.id===editId?entry:d) : [...data, entry];
  persist();
  closeModal();
  renderAll();
  toast(editId ? "Facture mise à jour." : "Facture ajoutée.");
  syncToSheets(entry);
}

function deleteEntry(id){
  if(!confirm("Supprimer cette facture ?")) return;
  data = data.filter(d=>d.id!==id);
  persist();
  renderAll();
  toast("Facture supprimée.");
  syncDelete(id);
}

function persist(){
  localStorage.setItem("ab2s_factures", JSON.stringify(data));
}

function syncToSheets(entry){
  if(!gsUrl) return;
  const params = new URLSearchParams();
  Object.entries(entry).forEach(([k,v]) => params.append(k, v ?? ""));
  fetch(gsUrl, { method:"POST", mode:"no-cors", body:params }).catch(()=>{});
}

function syncDelete(id){
  if(!gsUrl) return;
  const params = new URLSearchParams();
  params.append("action_type","delete");
  params.append("id", id);
  fetch(gsUrl, { method:"POST", mode:"no-cors", body:params }).catch(()=>{});
}

function loadFromSheets(){
  if(!gsUrl){ toast("Aucune URL configurée.","warn"); return; }
  toast("Chargement depuis Sheets...");
  const existing = document.getElementById("jsonp-script");
  if(existing) existing.remove();
  window._sheetsCallback = function(json){
    const s = document.getElementById("jsonp-script");
    if(s) s.remove();
    if(json.status==="ok" && Array.isArray(json.data) && json.data.length > 0){
      data = json.data.map(d=>({...d, montant:parseFloat(d.montant)||0}));
      localStorage.setItem("ab2s_factures", JSON.stringify(data));
      renderAll();
      toast("Données chargées depuis Google Sheets.");
    } else {
      toast("Sheets vide ou inaccessible.","warn");
    }
  };
  const s = document.createElement("script");
  s.id = "jsonp-script";
  s.src = gsUrl + "?callback=_sheetsCallback&t=" + Date.now();
  s.onerror = () => toast("Impossible de contacter Sheets.","warn");
  document.body.appendChild(s);
}

function filtered(){
  const type   = document.getElementById("f-type").value;
  const action = document.getElementById("f-action").value;
  const statut = document.getElementById("f-statut").value;
  const mois   = document.getElementById("f-mois").value;
  const q      = (document.getElementById("f-search").value||"").toLowerCase();
  return data.filter(d=>
    (!type   || d.type===type) &&
    (!action || d.action===action) &&
    (!statut || d.statut===statut) &&
    (!mois   || d.periode===mois) &&
    (!q      || (d.fournisseur||"").toLowerCase().includes(q)||(d.comment||"").toLowerCase().includes(q))
  );
}

function badgeSt(s){
  const map={"À traiter":"b-traiter","En cours":"b-cours","Récupérée":"b-recup","Annulée":"b-annul"};
  return `<span class="badge ${map[s]||''}">${s}</span>`;
}
function badgeType(t){
  return `<span class="badge ${t==="Dépenses mensuelles"?"b-mensuel":"b-type"}">${t}</span>`;
}
function fmtDate(d){ return d?new Date(d+"T12:00:00").toLocaleDateString("fr-FR"):"—"; }
function fmtMoney(n){ return n?Number(n).toLocaleString("fr-FR",{style:"currency",currency:"EUR",maximumFractionDigits:2}):"—"; }

function renderKpis(){
  const total   = data.length;
  const traiter = data.filter(d=>d.statut==="À traiter").length;
  const cours   = data.filter(d=>d.statut==="En cours").length;
  const recup   = data.filter(d=>d.statut==="Récupérée").length;
  const montant = data.filter(d=>d.statut!=="Annulée").reduce((s,d)=>s+(parseFloat(d.montant)||0),0);
  document.getElementById("kpis").innerHTML = `
    <div class="kpi-item"><div class="kpi-label">Total factures</div><div class="kpi-val info">${total}</div></div>
    <div class="kpi-item"><div class="kpi-label">À traiter</div><div class="kpi-val danger">${traiter}</div></div>
    <div class="kpi-item"><div class="kpi-label">En cours</div><div class="kpi-val warning">${cours}</div></div>
    <div class="kpi-item"><div class="kpi-label">Récupérées</div><div class="kpi-val success">${recup}</div></div>
    <div class="kpi-item"><div class="kpi-label">Montant estimé</div><div class="kpi-val">${montant.toLocaleString("fr-FR",{style:"currency",currency:"EUR",maximumFractionDigits:0})}</div></div>
  `;
}

function renderTable(){
  const rows = filtered();
  const tbody = document.getElementById("tbody");
  const empty = document.getElementById("empty-state");
  if(!rows.length){ tbody.innerHTML=""; empty.style.display="block"; return; }
  empty.style.display="none";
  tbody.innerHTML = rows.map(d=>`
    <tr>
      <td>${badgeType(d.type)}</td>
      <td title="${d.fournisseur}">${d.fournisseur}</td>
      <td style="font-family:'DM Mono',monospace;font-size:12px">${fmtMoney(d.montant)}</td>
      <td>${d.periode||"—"}</td>
      <td><span class="badge b-action" title="${d.action}">${d.action}</span></td>
      <td>${badgeSt(d.statut)}</td>
      <td style="font-size:12px;color:var(--text-mid)">${fmtDate(d.date)}</td>
      <td title="${d.comment||d.detail||''}" style="color:var(--text-mid)">${d.comment||d.detail||"—"}</td>
      <td style="display:flex;gap:2px;align-items:center">
        <button class="btn-icon btn-icon-edit" onclick="openModal('${d.id}')" title="Modifier">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
        </button>
        <button class="btn-icon" onclick="deleteEntry('${d.id}')" title="Supprimer">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
      </td>
    </tr>
  `).join("");
}

function renderSynthese(){
  const TYPES   = ["Matériels/Fournitures","Hôtel/Déplacement","Restauration","Dépenses mensuelles","Autres"];
  const ACTIONS = ["Plateforme en ligne","Appeler fournisseur","Envoyer mail","Relance comptable","En attente"];
  const STATUTS = ["À traiter","En cours","Récupérée","Annulée"];
  function rows(keys, fn){
    return keys.map(k=>{
      const items = data.filter(d=>fn(d)===k);
      const m = items.reduce((s,d)=>s+(parseFloat(d.montant)||0),0);
      return `<div class="synth-row"><span class="label">${k}</span><span class="vals"><span class="count">${items.length} fact.</span><span class="amount">${m.toLocaleString("fr-FR",{style:"currency",currency:"EUR",maximumFractionDigits:0})}</span></span></div>`;
    }).join("");
  }
  const allMois = [...new Set(data.map(d=>d.periode).filter(Boolean))].slice(0,8);
  document.getElementById("synth-grid").innerHTML = `
    <div class="synth-card"><h4>Par type</h4>${rows(TYPES,d=>d.type)}</div>
    <div class="synth-card"><h4>Par action</h4>${rows(ACTIONS,d=>d.action)}</div>
    <div class="synth-card"><h4>Par statut</h4>${rows(STATUTS,d=>d.statut)}</div>
    <div class="synth-card"><h4>Par mois</h4>${allMois.length?rows(allMois,d=>d.periode):'<div class="synth-row"><span class="label" style="color:var(--text-light)">Aucune donnée</span></div>'}</div>
  `;
}

function renderAll(){ renderKpis(); renderTable(); }

let toastTimer;
function toast(msg, type="ok"){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.style.background = type==="warn" ? "#ea580c" : "var(--navy)";
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove("show"), 2800);
}

document.getElementById("modal-overlay").addEventListener("click", e=>{ if(e.target===e.currentTarget) closeModal(); });
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

buildMois();
renderAll();
loadFromSheets();
</script>
</body>
</html>
